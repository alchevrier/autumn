name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Publish Compiler Plugin to Maven Local
      run: ./gradlew :autumn-compiler-plugin:publishToMavenLocal

    - name: Build and Test
      run: ./gradlew build koverXmlReport

    # (Optional) You can setup codecov or coveralls action here to process the Kover XML report
    # - name: Upload coverage reports to Codecov
    #   uses: codecov/codecov-action@v4
    #   with:
    #     files: ./build/reports/kover/report.xml
    #     token: ${{ secrets.CODECOV_TOKEN }}
