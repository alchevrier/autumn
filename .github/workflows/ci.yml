name: CI

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 23
      uses: actions/setup-java@v4
      with:
        java-version: '23'
        distribution: 'temurin'
        cache: gradle
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    - name: Publish Compiler Plugin to Maven Local
      run: ./gradlew :autumn-compiler-plugin:publishToMavenLocal
    - name: Build and Test
      run: ./gradlew koverXmlReport build
    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v4
      with:
        files: ./build/reports/kover/report.xml
        token: ${{ secrets.CODECOV_TOKEN }}

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 23
      uses: actions/setup-java@v4
      with:
        java-version: '23'
        distribution: 'temurin'
        cache: gradle
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    - name: Publish Compiler Plugin to Maven Local
      run: ./gradlew :autumn-compiler-plugin:publishToMavenLocal
    - name: Prepare Cryptographic Key and Credentials
      env:
        RAW_USER: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
        RAW_PASS: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
      run: |
        EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
        echo "ORG_GRADLE_PROJECT_signingKey<<$EOF" >> "$GITHUB_ENV"
        echo "${{ secrets.SIGNING_KEY_BASE64 }}" | base64 -d >> "$GITHUB_ENV"
        echo "" >> "$GITHUB_ENV"
        echo "$EOF" >> "$GITHUB_ENV"
        
        EOF_USER=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
        echo "ORG_GRADLE_PROJECT_mavenCentralUsername<<$EOF_USER" >> "$GITHUB_ENV"
        echo -n "$RAW_USER" | tr -d '[:space:]' >> "$GITHUB_ENV"
        echo "" >> "$GITHUB_ENV"
        echo "$EOF_USER" >> "$GITHUB_ENV"
        
        EOF_PASS=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
        echo "ORG_GRADLE_PROJECT_mavenCentralPassword<<$EOF_PASS" >> "$GITHUB_ENV"
        echo -n "$RAW_PASS" | tr -d '[:space:]' >> "$GITHUB_ENV"
        echo "" >> "$GITHUB_ENV"
        echo "$EOF_PASS" >> "$GITHUB_ENV"
    - name: Publish to Sonatype Maven Central
      run: ./gradlew publishAndReleaseToMavenCentral
      env:
        ORG_GRADLE_PROJECT_signingPassword: ${{ secrets.SIGNING_PASSWORD }}
